name: Build and Deploy Shiny Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'reports/**'
      - 'artifacts/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: acrretailforecast.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build --no-cache -f app/Dockerfile \
            -t acrretailforecast.azurecr.io/retail-forecast-app:${{ github.sha }} \
            -t acrretailforecast.azurecr.io/retail-forecast-app:latest \
            .
          docker push acrretailforecast.azurecr.io/retail-forecast-app:${{ github.sha }}
          docker push acrretailforecast.azurecr.io/retail-forecast-app:latest

      - name: Deploy to Azure App Service
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set container image
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config container set \
              --name retail-forecast-app \
              --resource-group rg-retail-forecast \
              --container-image-name acrretailforecast.azurecr.io/retail-forecast-app:${{ github.sha }} \
              --container-registry-url https://acrretailforecast.azurecr.io \
              --container-registry-user ${{ secrets.ACR_USERNAME }} \
              --container-registry-password ${{ secrets.ACR_PASSWORD }}
            az webapp restart --name retail-forecast-app --resource-group rg-retail-forecast
